name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_REPO }}
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_USER: ${{ secrets.VM_USER }}

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------- Backend --------
      - name: Build backend image
        run: |
          docker build -t $DOCKERHUB_REPO-backend:${{ steps.meta.outputs.tag }} ./backend
          docker tag $DOCKERHUB_REPO-backend:${{ steps.meta.outputs.tag }} $DOCKERHUB_REPO-backend:latest

      - name: Push backend image
        run: |
          docker push $DOCKERHUB_REPO-backend:${{ steps.meta.outputs.tag }}
          docker push $DOCKERHUB_REPO-backend:latest

      # -------- Frontend --------
      - name: Build frontend image
        run: |
          docker build -t $DOCKERHUB_REPO-frontend:${{ steps.meta.outputs.tag }} ./frontend
          docker tag $DOCKERHUB_REPO-frontend:${{ steps.meta.outputs.tag }} $DOCKERHUB_REPO-frontend:latest

      - name: Push frontend image
        run: |
          docker push $DOCKERHUB_REPO-frontend:${{ steps.meta.outputs.tag }}
          docker push $DOCKERHUB_REPO-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && 
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no $VM_USER@$VM_HOST << 'EOF'

            set -e

            mkdir -p ~/mean-app
            cd ~/mean-app

            if [ -d ".git" ]; then
              git pull origin main || git pull origin master
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker compose down
            docker compose pull
            docker compose up -d

            docker image prune -f

          EOF
